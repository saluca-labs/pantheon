apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: tiresias-logging
  labels:
    app: fluent-bit
    tier: logging
    purpose: supplemental
spec:
  selector:
    matchLabels:
      app: fluent-bit
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: fluent-bit
        tier: logging
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2020"
    spec:
      serviceAccountName: fluent-bit
      terminationGracePeriodSeconds: 30
      initContainers:
        # Phase F — render per-partner [FILTER]/[OUTPUT] into an emptyDir
        # volume that the main fluent-bit container picks up via @INCLUDE.
        # Image: python:3.12-slim + pyyaml installed at runtime to keep image
        # pinning minimal. Script is mounted from the main fluent-bit
        # ConfigMap under /opt/scripts.
        - name: partner-conf-generator
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              pip install --quiet --disable-pip-version-check pyyaml
              python /opt/scripts/generate_partner_conf.py
          env:
            - name: TIRESIAS_PARTNERS_YAML
              value: /etc/fluent-bit/partners/partners.yaml
            - name: TIRESIAS_PARTNER_CONF_OUT
              value: /rendered/partner-exports.conf
            - name: TIRESIAS_TLS_SECRET_DIR
              value: /etc/fluent-bit/secrets/tls
            - name: TIRESIAS_AUTH_SECRET_DIR
              value: /etc/fluent-bit/secrets/auth
            - name: DRY_RUN_PARTNER_ID
              valueFrom:
                configMapKeyRef:
                  name: fluent-bit-partner-exports
                  key: dry_run_partner_id
                  optional: true
          volumeMounts:
            - name: partners-config
              mountPath: /etc/fluent-bit/partners
              readOnly: true
            - name: generator-script
              mountPath: /opt/scripts
              readOnly: true
            - name: rendered-conf
              mountPath: /rendered
            - name: partner-tls-certs
              mountPath: /etc/fluent-bit/secrets/tls
              readOnly: true
            - name: partner-auth-tokens
              mountPath: /etc/fluent-bit/secrets/auth
              readOnly: true
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
        - operator: Exists
          effect: NoSchedule
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.1.9
          imagePullPolicy: IfNotPresent
          ports:
            - name: http-metrics
              containerPort: 2020
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
            - name: config
              mountPath: /fluent-bit/etc/parsers.conf
              subPath: parsers.conf
            - name: rendered-conf
              mountPath: /fluent-bit/etc/partner-exports.conf
              subPath: partner-exports.conf
            - name: partner-tls-certs
              mountPath: /etc/fluent-bit/secrets/tls
              readOnly: true
            - name: partner-auth-tokens
              mountPath: /etc/fluent-bit/secrets/auth
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 2020
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 2020
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: config
          configMap:
            name: fluent-bit-config
        - name: partners-config
          configMap:
            name: fluent-bit-partner-exports
        - name: generator-script
          configMap:
            name: fluent-bit-partner-generator
            defaultMode: 0755
        - name: rendered-conf
          emptyDir: {}
        - name: partner-tls-certs
          secret:
            secretName: partner-export-tls-certs
            optional: true
        - name: partner-auth-tokens
          secret:
            secretName: partner-export-auth-tokens
            optional: true
