steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-marketing'
    args: [
      'build',
      '-t', 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/marketing:v3.6.2',
      '-f', 'portal-marketing/Dockerfile',
      './portal-marketing'
    ]

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-marketing'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/marketing:v3.6.2'
    waitFor: ['build-marketing']

images:
  - 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/marketing:v3.6.2'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: GCS_ONLY

timeout: '1800s'
