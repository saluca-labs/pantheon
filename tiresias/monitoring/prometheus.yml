global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alertmanager integration (FINDING-22)
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# Consolidated rule file — alerts.yml removed (FINDING-23)
rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "soulauth"
    metrics_path: /metrics
    static_configs:
      - targets: ["soulauth:8000"]
        labels:
          service: "soulauth"
          environment: "local"
    scrape_interval: 10s

  - job_name: "soulgate"
    metrics_path: /metrics
    static_configs:
      - targets: ["soulgate:8002"]
        labels:
          service: "soulgate"
          environment: "local"
    scrape_interval: 10s

  - job_name: "soulwatch"
    metrics_path: /metrics
    static_configs:
      - targets: ["soulwatch:8001"]
        labels:
          service: "soulwatch"
          environment: "local"
    scrape_interval: 10s
