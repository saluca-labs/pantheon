# Tiresias SOC — Promtail Configuration
# Scrapes logs from DreamServer and pentest reports

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Pentest scan logs
  - job_name: pentest-scans
    static_configs:
      - targets: [localhost]
        labels:
          job: pentest
          source: scanner
          __path__: /pentest-reports/**/*.log
    pipeline_stages:
      - regex:
          expression: '(?P<scanner>nuclei|zap|trivy|custom)'
      - labels:
          scanner:

  # Pentest JSON results
  - job_name: pentest-json
    static_configs:
      - targets: [localhost]
        labels:
          job: pentest
          source: results
          __path__: /pentest-reports/**/*.json
    pipeline_stages:
      - json:
          expressions:
            severity: severity
            host: host
      - labels:
          severity:

  # DreamServer syslog
  - job_name: dreamserver-syslog
    static_configs:
      - targets: [localhost]
        labels:
          job: dreamserver
          source: syslog
          __path__: /var/log/syslog

  # DreamServer auth log
  - job_name: dreamserver-auth
    static_configs:
      - targets: [localhost]
        labels:
          job: dreamserver
          source: auth
          __path__: /var/log/auth.log
    pipeline_stages:
      - regex:
          expression: '(?P<action>Accepted|Failed|Invalid)'
      - labels:
          action:

  # Docker container logs
  - job_name: docker-containers
    static_configs:
      - targets: [localhost]
        labels:
          job: docker
          __path__: /var/log/containers/*.log
    pipeline_stages:
      - docker: {}

  # Pentest report text files
  - job_name: pentest-reports
    static_configs:
      - targets: [localhost]
        labels:
          job: pentest
          source: report
          __path__: /pentest-reports/**/*.txt
