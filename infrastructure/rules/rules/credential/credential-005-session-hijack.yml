title: Agent Session Hijacking
id: credential-005
status: stable
level: critical
description: |
  Detects a session token being used from a different IP address or
  user-agent string than the one that originally created the session.
  Agent sessions are bound to their originating network context; a mid-session
  context change is a strong indicator of session token theft, man-in-the-middle
  interception, or replay from a compromised intermediary.
author: Saluca LLC
date: 2026/03/31
references:
  - https://tiresias.network/docs/rules/credential-005
  - https://attack.mitre.org/techniques/T1563/
tags:
  - attack.credential_access
  - attack.lateral_movement
  - mitre.t1563
  - tiresias.session
logsource:
  product: tiresias
  service: soulgate
detection:
  selection:
    event_type: api_request
  session_context_mismatch:
    |equalities|:
      - session.current_ip != session.original_ip
      - session.current_user_agent != session.original_user_agent
  filter_known_proxy_rotation:
    source_type: tor_exit_node
  condition: selection and session_context_mismatch and not filter_known_proxy_rotation
fields:
  - session_id
  - agent_id
  - session.original_ip
  - session.current_ip
  - session.original_user_agent
  - session.current_user_agent
  - session.created_at
  - tls_fingerprint
  - geo_location_original
  - geo_location_current
  - timestamp
falsepositives:
  - Agent behind a load balancer or NAT with rotating egress IPs
  - SDK version upgrade mid-session changing user-agent string
  - Corporate proxy pool cycling outbound addresses
response_playbook: playbook-credential-005
