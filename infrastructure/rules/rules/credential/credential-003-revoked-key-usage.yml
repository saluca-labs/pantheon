title: Revoked SoulKey Usage Attempt
id: credential-003
status: stable
level: critical
description: |
  Detects attempts to authenticate using a SoulKey that has been suspended
  or revoked. After revocation, any usage attempt indicates either a
  compromised agent still holding old credentials, an attacker using
  previously exfiltrated keys, or a misconfigured system that failed to
  pick up the revocation. This is always suspicious and warrants immediate
  investigation.
author: Saluca LLC
date: 2026/03/31
references:
  - https://tiresias.network/docs/rules/credential-003
  - https://attack.mitre.org/techniques/T1078/004/
tags:
  - attack.credential_access
  - attack.persistence
  - mitre.t1078.004
  - tiresias.soulkey
logsource:
  product: tiresias
  service: soulauth
detection:
  selection:
    event_type: authentication_failure
    failure_reason:
      - key_revoked
      - key_suspended
      - key_expired_revoked
      - certificate_revoked
  condition: selection
fields:
  - soulkey_id
  - soulkey_revocation_date
  - soulkey_revocation_reason
  - source_ip
  - source_agent_id
  - target_service
  - geo_location
  - user_agent
  - timestamp
falsepositives:
  - Brief race condition during key rotation where old key is revoked
    moments before new key propagates (typically resolves within seconds)
  - Cached credentials in a queue worker that has not yet restarted
response_playbook: playbook-credential-003
