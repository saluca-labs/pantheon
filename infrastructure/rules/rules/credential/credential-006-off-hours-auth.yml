title: Off-Hours Agent Authentication
id: credential-006
status: stable
level: low
description: |
  Detects agent authentication events occurring outside of defined business
  hours. While some agents operate 24/7, many are scoped to business-hours
  workflows. Authentication outside the expected window may indicate
  unauthorized use of stolen credentials, a compromised agent operating
  while defenders are offline, or shadow automation not governed by policy.
  Business hours are configurable per-agent via agent_policy.operating_hours.
author: Saluca LLC
date: 2026/03/31
references:
  - https://tiresias.network/docs/rules/credential-006
  - https://attack.mitre.org/techniques/T1078/
tags:
  - attack.credential_access
  - attack.initial_access
  - mitre.t1078
  - tiresias.policy
logsource:
  product: tiresias
  service: soulauth
detection:
  selection:
    event_type: authentication_success
  time_condition:
    timestamp|time:
      - gte: '22:00'
      - lte: '06:00'
  filter_24x7_agents:
    agent_policy.operating_hours: always
  filter_scheduled_maintenance:
    event_subtype: scheduled_maintenance
  condition: selection and time_condition and not filter_24x7_agents and not filter_scheduled_maintenance
  group_by:
    - agent_id
fields:
  - agent_id
  - soulkey_id
  - source_ip
  - geo_location
  - agent_policy.operating_hours
  - agent_policy.timezone
  - local_time
  - timestamp
falsepositives:
  - Agents with global deployment spanning multiple timezones
  - Legitimate after-hours batch processing or scheduled jobs
  - Incident response activities during off-hours
response_playbook: playbook-credential-006
