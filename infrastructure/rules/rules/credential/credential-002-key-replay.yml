title: SoulKey Token Replay Attack
id: credential-002
status: stable
level: critical
description: |
  Detects the same SoulKey being used from multiple distinct network sources
  within a short time window. SoulKeys are bound to a single agent identity
  and should not appear from different origins. Concurrent use from different
  IPs or subnets strongly indicates token theft and replay, potentially from
  a compromised agent or intercepted API traffic.
author: Saluca LLC
date: 2026/03/31
references:
  - https://tiresias.network/docs/rules/credential-002
  - https://attack.mitre.org/techniques/T1550/001/
tags:
  - attack.credential_access
  - attack.lateral_movement
  - mitre.t1550.001
  - tiresias.soulkey
logsource:
  product: tiresias
  service: soulauth
detection:
  selection:
    event_type: authentication_success
  condition: selection | count(distinct source_ip) by soulkey_id > 1
  timeframe: 5m
  group_by:
    - soulkey_id
  filter_known_multi_region:
    agent_config.multi_region: true
  filter_vpn_failover:
    event_subtype: vpn_failover
  condition_final: selection and not filter_known_multi_region and not filter_vpn_failover
fields:
  - soulkey_id
  - source_ip
  - source_subnet
  - geo_location
  - user_agent
  - agent_id
  - session_id
  - tls_fingerprint
  - timestamp
falsepositives:
  - Agents explicitly configured for multi-region failover
  - VPN or proxy failover causing rapid IP change
  - Mobile agents transitioning between network interfaces
response_playbook: playbook-credential-002
