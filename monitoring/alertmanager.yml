# Alertmanager configuration (FINDING-22)
# Routes alerts from Prometheus to notification channels.
global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: 'default'
    # Configure webhook, email, or Slack receivers here.
    # Example webhook:
    # webhook_configs:
    #   - url: 'http://soulauth:8000/webhooks/alertmanager'
    #     send_resolved: true

  - name: 'critical'
    # High-priority channel for critical alerts.
    # webhook_configs:
    #   - url: 'http://soulauth:8000/webhooks/alertmanager'
    #     send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
