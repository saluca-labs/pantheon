# Deployed via systemd on each mesh node
# soulauth-pep.service
[Unit]
Description=SoulAuth PEP Agent
After=tailscaled.service
Wants=network-online.target

[Service]
Type=simple
ExecStart=/usr/local/bin/soulauth-pep-agent \
    --verify-key=/etc/soulauth/public.pem \
    --soul-svc-url=https://soul-svc.saluca.com \
    --node-id=%H \
    --listen-address=0.0.0.0:8080
Restart=always
RestartSec=10
User=soulauth
Group=soulauth
CapabilityBoundingSet=CAP_NET_BIND_SERVICE
AmbientCapabilities=CAP_NET_BIND_SERVICE
NoNewPrivileges=true
ProtectSystem=strict
ProtectHome=true
PrivateTmp=true
ProtectKernelTunables=true
ProtectKernelModules=true
ProtectControlGroups=true
RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
RestrictNamespaces=true
RestrictRealtime=true
MemoryLimit=100M
CPUQuota=20%

[Install]
WantedBy=multi-user.target