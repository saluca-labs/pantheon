# Forked from apps/platform-api/k8s/hpa.yaml @ 02a6771 for pantheon namespace.
# Adds platform-web + memory-service HPAs (no tiresias precedent).
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: soulauth-hpa
  namespace: pantheon
  labels:
    app: soulauth
    app.kubernetes.io/name: soulauth
    app.kubernetes.io/part-of: pantheon
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: soulauth
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
