# Forked from apps/platform-api/k8s/portal-deployment.yaml @ 02a6771 for pantheon namespace
# Changes:
#   - namespace + serviceAccountName + image registry per pantheon
#   - NEXT_PUBLIC_APP_URL: tiresias.network -> pantheon.saluca.com
#   - COOKIE_DOMAIN: .tiresias.network -> pantheon.saluca.com (no leading dot — single host)
#   - NEXT_PUBLIC_*_API_URL: rewritten to *.pantheon.svc.cluster.local
#   - Stripe envs (STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PRICE_*): dropped (deferred from MVP)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: pantheon
  labels:
    app: portal
    app.kubernetes.io/name: portal
    app.kubernetes.io/part-of: pantheon
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portal
      app.kubernetes.io/part-of: pantheon
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: portal
        app.kubernetes.io/name: portal
        app.kubernetes.io/part-of: pantheon
    spec:
      serviceAccountName: pantheon-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: portal
          image: us-central1-docker.pkg.dev/salucainfrastructure/pantheon/portal:v0.1.2
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nextjs-cache
              mountPath: /app/.next/cache
          env:
            - name: NEXT_PUBLIC_APP_URL
              value: "https://pantheon.saluca.com"
            - name: NEXT_PUBLIC_SOULAUTH_API_URL
              value: "http://soulauth.pantheon.svc.cluster.local"
            - name: NEXT_PUBLIC_SOULWATCH_API_URL
              value: "http://soulwatch.pantheon.svc.cluster.local"
            - name: NEXT_PUBLIC_SOULGATE_API_URL
              value: "http://soulgate.pantheon.svc.cluster.local"
            # Server-side runtime URL used by API routes (login, callback,
            # forgot-password, billing webhook, etc.). Distinct from
            # NEXT_PUBLIC_* which is webpack-baked at build time.
            - name: SOULAUTH_INTERNAL_URL
              value: "http://soulauth.pantheon.svc.cluster.local"
            - name: NODE_ENV
              value: "production"
            - name: COOKIE_DOMAIN
              value: "pantheon.saluca.com"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
              ephemeral-storage: 100Mi
            limits:
              cpu: "1"
              memory: 512Mi
              ephemeral-storage: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: nextjs-cache
          emptyDir:
            sizeLimit: 256Mi
