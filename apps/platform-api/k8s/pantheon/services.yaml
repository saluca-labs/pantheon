# Forked from inline Service stanzas in tiresias deployment files @ 02a6771; consolidated here.
# Annotations point to BackendConfigs in backendconfigs.yaml.
---
apiVersion: v1
kind: Service
metadata:
  name: soulauth
  namespace: pantheon
  labels:
    app: soulauth
    app.kubernetes.io/name: soulauth
    app.kubernetes.io/part-of: pantheon
  annotations:
    beta.cloud.google.com/backend-config: '{"default": "soulauth-backendconfig"}'
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: soulauth
---
apiVersion: v1
kind: Service
metadata:
  name: soulgate
  namespace: pantheon
  labels:
    app: soulgate
    app.kubernetes.io/name: soulgate
    app.kubernetes.io/part-of: pantheon
  annotations:
