# Forked from apps/platform-api/k8s/soulauth-deployment.yaml (SA stanza) @ 02a6771 for pantheon namespace
# Workload Identity binding to pantheon-sa@salucainfrastructure.iam.gserviceaccount.com is created
# out-of-band via gcloud (see RUNBOOK.md Step 2e/2f).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pantheon-sa
  namespace: pantheon
  labels:
    app.kubernetes.io/part-of: pantheon
  annotations:
    iam.gke.io/gcp-service-account: pantheon-sa@salucainfrastructure.iam.gserviceaccount.com
