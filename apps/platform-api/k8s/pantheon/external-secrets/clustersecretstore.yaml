# ClusterSecretStore — bridges External Secrets Operator (ESO) to GCP Secret
# Manager. Reads from the salucainfrastructure project, which is the canonical
# secrets store for the pantheon platform (per ADR: GCP SM is source of truth).
#
# Authentication: Workload Identity. The ESO controller pod runs as the K8s
# ServiceAccount external-secrets/external-secrets, which is bound to the GCP
# ServiceAccount external-secrets@salucainfrastructure.iam.gserviceaccount.com.
# The GCP SA has roles/secretmanager.secretAccessor on salucainfrastructure.
#
# Setup commands that brought this into being (2026-05-18):
#   gcloud iam service-accounts create external-secrets \
#     --display-name="External Secrets Operator" --project=salucainfrastructure
#   gcloud projects add-iam-policy-binding salucainfrastructure \
#     --member="serviceAccount:external-secrets@salucainfrastructure.iam.gserviceaccount.com" \
#     --role="roles/secretmanager.secretAccessor" --condition=None
#   gcloud iam service-accounts add-iam-policy-binding \
#     external-secrets@salucainfrastructure.iam.gserviceaccount.com \
#     --role="roles/iam.workloadIdentityUser" \
#     --member="serviceAccount:salucainfrastructure.svc.id.goog[external-secrets/external-secrets]"
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcpsm-salucainfrastructure
spec:
  provider:
    gcpsm:
      projectID: salucainfrastructure
      auth:
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: tiresias-prod
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
