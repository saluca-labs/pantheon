# ExternalSecret — declarative mapping of GCP Secret Manager entries into the
# pantheon-secrets K8s Secret. ESO refreshes from GCP SM every 1h by default;
# rotating a secret in GCP SM propagates here without a manual kubectl edit.
#
# Source of truth: salucainfrastructure GCP Secret Manager (via gcpsm-salucainfrastructure
# ClusterSecretStore). Keys with the pantheon- prefix are scoped to this service;
# anthropic-api-key is a shared key reused across multiple Saluca services.
#
# Adding a key here is a two-step process:
#   1. Push the value:  gcloud secrets create pantheon-<name> --project=salucainfrastructure \
#                          --replication-policy=automatic
#                       echo -n "<value>" | gcloud secrets versions add pantheon-<name> \
#                          --project=salucainfrastructure --data-file=-
#   2. Add a data entry to this manifest's data: list, then `kubectl apply -f`.
#
# Rotation: `gcloud secrets versions add pantheon-<name> --data-file=-`. ESO
# picks up the new version within refreshInterval. Pods may need a restart to
# observe the new env vars (env-from-secret values are read at pod start).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pantheon-secrets
  namespace: pantheon
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcpsm-salucainfrastructure
  target:
    name: pantheon-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # ── Database (CloudSQL Auth Proxy on localhost) ──────────────────────────
    - secretKey: database-url
      remoteRef:
        key: pantheon-database-url
    - secretKey: database-url-sync
      remoteRef:
        key: pantheon-database-url-sync
    # ── Cross-service internal API auth ──────────────────────────────────────
    - secretKey: internal-api-key
      remoteRef:
        key: pantheon-internal-api-key
    # ── JWT signing (SoulAuth) ───────────────────────────────────────────────
    - secretKey: jwt-kid
      remoteRef:
        key: pantheon-jwt-kid
    - secretKey: jwt-private-key
      remoteRef:
        key: pantheon-jwt-private-key
    - secretKey: jwt-public-key
      remoteRef:
        key: pantheon-jwt-public-key
    # ── Memory service shared secret ─────────────────────────────────────────
    - secretKey: memory-service-key
      remoteRef:
        key: pantheon-memory-service-key
    # ── Session cookie signing (platform-web) ────────────────────────────────
    - secretKey: session-secret
      remoteRef:
        key: pantheon-session-secret
    # ── Soul service admin key ───────────────────────────────────────────────
    - secretKey: soul-service-key
      remoteRef:
        key: pantheon-soul-service-key
    # ── LLM provider keys (platform-web @platform/llm) ───────────────────────
    # anthropic-api-key is shared across Saluca services (NOT pantheon-prefixed).
    - secretKey: anthropic-api-key
      remoteRef:
        key: anthropic-api-key
    - secretKey: openai-api-key
      remoteRef:
        key: pantheon-openai-api-key
    # gemini-api-key is shared across Saluca services (NOT pantheon-prefixed).
    # Used by the llm-models-heartbeat CronJob to poll Gemini /models endpoint.
    - secretKey: gemini-api-key
      remoteRef:
        key: gemini-api-key
    # NOTE: ollama-host removed 2026-05-18 — pivoted to cloud-LLM-only stack
    # (Anthropic + OpenRouter + Gemini + Ollama Cloud). Local Ollama deployment
    # was considered and rejected. See _llm_available_models table + 6h heartbeat
    # CronJob for cloud-model availability tracking.
