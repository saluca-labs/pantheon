# Forked from apps/platform-api/k8s/network-policy.yaml @ 02a6771 for pantheon namespace.
# CRITICAL change: pod selectors switched from `app.kubernetes.io/part-of: tiresias` to `pantheon`
# (the source had per-namespace policies that selected on the part-of label; that label is now `pantheon`
# in this namespace). Adds platform-web, memory-service, and tiresias-proxy netpols.
# Redis is intentionally not deployed in pantheon MVP (proxy falls back to in-memory rate limiting).
---
# SoulAuth: accepts from pantheon pods + GCE health probers, egress to DB + DNS + WI metadata
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: soulauth-netpol
  namespace: pantheon
spec:
  podSelector:
    matchLabels:
      app: soulauth
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8000
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: pantheon
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - ipBlock:
            cidr: 130.211.0.0/22
        - ipBlock:
            cidr: 35.191.0.0/16
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 169.254.0.0/16
      ports:
        - protocol: TCP
          port: 80
    # 3307 is loopback to the cloud-sql-proxy sidecar; sidecar-local traffic
    # doesn't traverse netpol so no allow rule is required.
    # TCP 443 scoped to private.googleapis.com / restricted.googleapis.com VIP
    # range so cloud-sql-proxy can reach sqladmin.googleapis.com without
    # opening egress to 0.0.0.0/0:443.
    # NOTE 2026-05-10: 443 left open after a netpol-scope tightening (199.36.153.8/30)
    # broke cloud-sql-proxy in this cluster — sqladmin.googleapis.com resolves to public
    # Google IPs because Private Google Access is not enabled on the subnet.
    # See production-down incident; re-tighten requires enabling PGA on the GKE subnet first.
    - ports:
        - protocol: TCP
          port: 443
    # 3307 is the cloud-sql-proxy sidecar's egress to the Cloud SQL backend
    # (the original "loopback to sidecar" comment was incorrect — sidecar-local
    # traffic IS loopback, but the sidecar's OUTBOUND traffic to Cloud SQL on
    # 3307 traverses netpol). Required for any workload with cloud-sql-proxy.
    # Portal has no sidecar but the unused rule is harmless.
    - ports:
        - protocol: TCP
          port: 3307
