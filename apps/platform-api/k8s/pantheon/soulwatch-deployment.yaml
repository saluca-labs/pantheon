# Forked from apps/platform-api/k8s/soulwatch-deployment.yaml @ 02a6771 for pantheon namespace
# Changes: namespace, SA, image, secret name, internal URLs (same pattern as soulgate)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soulwatch
  namespace: pantheon
  labels:
    app: soulwatch
    app.kubernetes.io/name: soulwatch
    app.kubernetes.io/part-of: pantheon
    app.kubernetes.io/component: behavioral-analytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: soulwatch
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: soulwatch
        app.kubernetes.io/name: soulwatch
        app.kubernetes.io/part-of: pantheon
    spec:
      serviceAccountName: pantheon-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: soulwatch
          image: us-central1-docker.pkg.dev/salucainfrastructure/pantheon/soulwatch:v0.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
              name: http
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: SOULWATCH_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pantheon-secrets
                  key: database-url
            - name: SOULAUTH_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pantheon-secrets
                  key: database-url
            - name: SOULAUTH_DATABASE_URL_SYNC
              valueFrom:
                secretKeyRef:
                  name: pantheon-secrets
                  key: database-url-sync
            - name: SOULWATCH_SOULAUTH_URL
              value: "http://soulauth.pantheon.svc.cluster.local"
            - name: SOULWATCH_MODE
              value: "sidecar"
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pantheon-secrets
                  key: internal-api-key
            - name: SOULAUTH_JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: pantheon-secrets
                  key: jwt-public-key
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
              ephemeral-storage: 100Mi
            limits:
              cpu: "1"
              memory: 512Mi
              ephemeral-storage: 256Mi
          livenessProbe:
            httpGet:
              path: /watch/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /watch/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /watch/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.3
          args:
            - "--structured-logs"
            - "--auto-iam-authn"
            - "salucainfrastructure:us-central1:tiresias-db"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
            runAsNonRoot: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
