# Pantheon namespace kustomization — apply with `kubectl apply -k apps/platform-api/k8s/pantheon/`
# Resource order matches dependency: namespace + SA first, then config/policy, then workloads,
# then ingress, then job. Kustomize itself does NOT enforce ordering; this is documentation.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: pantheon

commonLabels:
  app.kubernetes.io/part-of: pantheon

resources:
  # Foundation
  - namespace.yaml
  - serviceaccount.yaml
  # Network + backend config
  - network-policy.yaml
  - backendconfigs.yaml
  # Workloads
  - soulauth-deployment.yaml
  - soulgate-deployment.yaml
  - soulwatch-deployment.yaml
  - portal-deployment.yaml
  - platform-web-deployment.yaml
  - memory-service-deployment.yaml
  - tiresias-proxy-deployment.yaml
  - soul-service-deployment.yaml
  - soul-mcp-deployment.yaml
  # Service surface
  - services.yaml
  # Reliability
  - hpa.yaml
  - pdb.yaml
  # Ingress + TLS
  - cert.yaml
  - ingress.yaml
  # Migration job (one-off, can be applied separately)
  - migrate-job.yaml
  # Observability
  - prometheus-monitor.yaml
  # CronJobs — native K8s scheduled work. RBAC is shared; each job is its
  # own manifest under cronjobs/. See cronjobs/README.md.
  - cronjobs/rbac.yaml
  - cronjobs/audit-retention.yaml

# Image tag overrides. CI bumps these via `kustomize edit set image`
# during deploy. Listed here so local `kubectl apply -k` does not silently
# roll back to the (old) tags hardcoded in each <name>-deployment.yaml.
# Source of truth is what the CI sets here — when CI publishes a new
# version it should also commit the bumped kustomization.yaml back to git.
images:
  - name: us-central1-docker.pkg.dev/salucainfrastructure/pantheon/memory-service
    newTag: v0.1.122
  - name: us-central1-docker.pkg.dev/salucainfrastructure/pantheon/platform-web
    newTag: v0.1.122
  - name: us-central1-docker.pkg.dev/salucainfrastructure/pantheon/portal
    newTag: v0.1.122
  - name: us-central1-docker.pkg.dev/salucainfrastructure/pantheon/soul-mcp
    newTag: v0.1.122
  - name: us-central1-docker.pkg.dev/salucainfrastructure/pantheon/soul-service
    newTag: v0.1.122
  - name: us-central1-docker.pkg.dev/salucainfrastructure/pantheon/soulauth
    newTag: v0.1.122
  - name: us-central1-docker.pkg.dev/salucainfrastructure/pantheon/soulgate
    newTag: v0.1.122
  - name: us-central1-docker.pkg.dev/salucainfrastructure/pantheon/soulwatch
    newTag: v0.1.122
  - name: us-central1-docker.pkg.dev/salucainfrastructure/pantheon/tiresias-proxy
    newTag: v0.1.122
