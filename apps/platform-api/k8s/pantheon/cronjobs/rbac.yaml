# RoleBinding + Role for diagnostic introspection (get/list/watch on jobs/configmaps,
# get on secrets) was originally included but removed pending IAM provisioning of
# container.roles.create / container.roleBindings.create for the CD service account.
# The agos-audit-retention CronJob does NOT require these at runtime — it reads
# DATABASE_URL via envvar injection at pod creation. Re-add when IAM is granted;
# see RUNBOOK for the IAM bootstrap step.
#
# Dedicated ServiceAccount for pantheon-namespace CronJobs.
#
# All scheduled jobs run as `pantheon-cronjob` (NOT `pantheon-sa` — that one
# is bound to the GCP IAM SA used by long-running workloads). The cronjob SA
# has its own Workload Identity binding to a separately-provisioned GCP SA
# (`pantheon-cronjob@salucainfrastructure.iam.gserviceaccount.com`) which
# carries only roles/cloudsql.client + roles/cloudsql.instanceUser. No
# bucket / log / monitoring grants — cronjobs that need those request them
# on a per-job basis via additional RoleBindings.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pantheon-cronjob
  namespace: pantheon
  labels:
    app.kubernetes.io/part-of: pantheon
    app.kubernetes.io/component: cronjob
  annotations:
    # Workload Identity binding: provision the GCP-side SA + IAM
    # `policyBinding` separately. The annotation alone does NOT grant any
    # GCP access — see apps/platform-api/k8s/pantheon/RUNBOOK.md
    # "Cronjob WI bootstrap" (TODO: add section when first cronjob ships).
    iam.gke.io/gcp-service-account: pantheon-cronjob@salucainfrastructure.iam.gserviceaccount.com
