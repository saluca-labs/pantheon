# Forked from apps/platform-api/k8s/pdb.yaml @ 02a6771 for pantheon namespace.
# Adds platform-web + memory-service PDBs (no tiresias precedent).
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: soulauth-pdb
  namespace: pantheon
  labels:
    app: soulauth
    app.kubernetes.io/name: soulauth
    app.kubernetes.io/part-of: pantheon
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: soulauth
