apiVersion: batch/v1
kind: CronJob
metadata:
  name: tiresias-trend-sampler
  namespace: tiresias
  labels:
    app.kubernetes.io/part-of: tiresias
    app.kubernetes.io/component: monitoring
spec:
  # Daily at 03:00 UTC (tech-debt #48).
  schedule: "0 3 * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: tiresias-trend-sampler
            app.kubernetes.io/part-of: tiresias
        spec:
          serviceAccountName: tiresias-sa
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          # Native sidecar (K8s >= 1.29): cloud-sql-proxy terminates automatically
          # when the main container exits.
          initContainers:
            - name: cloud-sql-proxy
              image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.3
              restartPolicy: Always
              args:
                - "--structured-logs"
                - "--auto-iam-authn"
                - "--exit-zero-on-sigterm"
                - "salucainfrastructure:us-central1:tiresias-db"
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
                runAsNonRoot: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          containers:
            - name: trend-sampler
              image: us-central1-docker.pkg.dev/salucainfrastructure/tiresias/tiresias-trend-sampler:v0.1.0
              imagePullPolicy: Always
              command: ["/bin/sh", "-c"]
              args:
                - |
                  echo "waiting for cloud-sql-proxy..."
                  for i in $(seq 1 30); do
                    if (echo > /dev/tcp/127.0.0.1/5432) 2>/dev/null; then
                      echo "cloud-sql-proxy ready after ${i}s"; break
                    fi
                    sleep 1
                  done
                  exec python /app/scripts/trend_sampler.py
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: tiresias-secrets
                      key: database-url-sync
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
