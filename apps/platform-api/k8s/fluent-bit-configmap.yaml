apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: tiresias-logging
  labels:
    app: fluent-bit
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        Health_Check  On

    # Tail only tiresias namespace container logs
    [INPUT]
        Name              tail
        Tag               kube.tiresias.*
        Path              /var/log/containers/*_tiresias_*.log
        Parser            cri
        DB                /var/log/fluent-bit-tiresias.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  5

    # Enrich with Kubernetes metadata (pod labels, namespace, container name)
    [FILTER]
        Name                kubernetes
        Match               kube.tiresias.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.tiresias.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_parsed
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Annotations         Off
        Labels              On

    # Parse JSON-structured logs emitted by tiresias services
    [FILTER]
        Name         parser
        Match        kube.tiresias.*
        Key_Name     log
        Parser       tiresias_json
        Reserve_Data True
        Preserve_Key True

    # Tag security-audit events for downstream routing
    # Matches either `level=SECURITY` or `severity=SECURITY` in the parsed JSON,
    # and also catches soulwatch/soulauth access-decision events.
    [FILTER]
        Name    rewrite_tag
        Match   kube.tiresias.*
        Rule    $level ^SECURITY$ kube.security.tiresias false
        Emitter_Name re_emitted_security_level

    [FILTER]
        Name    rewrite_tag
        Match   kube.tiresias.*
        Rule    $severity ^SECURITY$ kube.security.tiresias false
        Emitter_Name re_emitted_security_sev

    [FILTER]
        Name    rewrite_tag
        Match   kube.tiresias.*
        Rule    $logger ^tiresias\.security\..*$ kube.security.tiresias false
        Emitter_Name re_emitted_security_logger

    # Tag proxy request logs (matches tiresias.proxy.* loggers)
    [FILTER]
        Name    rewrite_tag
        Match   kube.tiresias.*
        Rule    $logger ^tiresias\.proxy(\..*)?$ kube.proxy.tiresias false
        Emitter_Name re_emitted_proxy

    # Add cluster-level metadata to every record
    [FILTER]
        Name   modify
        Match  *
        Add    cluster tiresias-v2
        Add    gcp_project salucainfrastructure

    # Assign a per-stream Cloud Logging log name via record key
    [FILTER]
        Name   modify
        Match  kube.security.tiresias
        Add    logging.googleapis.com/logName tiresias-security
        Add    stackdriver_log_name tiresias-security

    [FILTER]
        Name   modify
        Match  kube.proxy.tiresias
        Add    logging.googleapis.com/logName tiresias-proxy
        Add    stackdriver_log_name tiresias-proxy

    [FILTER]
        Name   modify
        Match  kube.tiresias.*
        Add    logging.googleapis.com/logName tiresias-general
        Add    stackdriver_log_name tiresias-general

    # ------------------------------------------------------------------
    # OUTPUTS
    # ------------------------------------------------------------------

    # Security audit stream → dedicated Cloud Logging log name.
    # Uses resource=global because rewrite_tag drops pod metadata from the tag;
    # pod/namespace/container info is preserved inside the `kubernetes` record key.
    [OUTPUT]
        Name                 stackdriver
        Match                kube.security.tiresias
        resource             global
        severity_key         level
        stackdriver_agent    fluent-bit-tiresias
        labels_key           logging.googleapis.com/labels
        export_to_project_id salucainfrastructure
        log_name_key         stackdriver_log_name

    # Proxy access/request logs → dedicated log name
    [OUTPUT]
        Name                 stackdriver
        Match                kube.proxy.tiresias
        resource             global
        severity_key         level
        export_to_project_id salucainfrastructure
        log_name_key         stackdriver_log_name

    # Everything else → general tiresias log name
    [OUTPUT]
        Name                 stackdriver
        Match                kube.tiresias.*
        resource             k8s_container
        k8s_cluster_name     tiresias-v2
        k8s_cluster_location us-central1
        export_to_project_id salucainfrastructure
        log_name_key         stackdriver_log_name

    # ------------------------------------------------------------------
    # PARTNER EXPORTS (Phase F) — rendered by scripts/generate_partner_conf.py
    # running as an initContainer. The generator reads ConfigMap
    # `fluent-bit-partner-exports` (partners.yaml) and writes this file.
    # When no partners are registered the include resolves to an inert
    # comment-only block so Fluent Bit keeps starting cleanly.
    # ------------------------------------------------------------------
    @INCLUDE partner-exports.conf

  parsers.conf: |
    [PARSER]
        Name         cri
        Format       regex
        Regex        ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key     time
        Time_Format  %Y-%m-%dT%H:%M:%S.%L%z

    [PARSER]
        Name         tiresias_json
        Format       json
        Time_Key     ts
        Time_Format  %Y-%m-%dT%H:%M:%SZ
        Time_Keep    On
