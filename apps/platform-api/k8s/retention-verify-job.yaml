apiVersion: batch/v1
kind: Job
metadata:
  name: tiresias-retention-verify
  namespace: tiresias
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: tiresias-sa
      restartPolicy: Never
      initContainers:
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.3
          restartPolicy: Always
          args:
            - "--structured-logs"
            - "--auto-iam-authn"
            - "--exit-zero-on-sigterm"
            - "salucainfrastructure:us-central1:tiresias-db"
      containers:
        - name: psql
          image: postgres:16
          command: ["/bin/sh","-c"]
          args:
            - |
              for i in $(seq 1 30); do (echo > /dev/tcp/127.0.0.1/5432) 2>/dev/null && break; sleep 1; done
              psql "$DB_URL" -c "SELECT version_num FROM alembic_version;"
              # Seeded count requires sweeper GUC under FORCE RLS.
              psql "$DB_URL" -c "SET app.retention_sweeper='on'; SELECT count(*) AS seeded FROM _retention_policies;"
              psql "$DB_URL" -c "SET app.retention_sweeper='on'; SELECT retention_tier, count(*) FROM _retention_policies GROUP BY retention_tier ORDER BY retention_tier;"
              psql "$DB_URL" -c "SELECT c.relname, c.relrowsecurity, c.relforcerowsecurity FROM pg_class c WHERE c.relname='_retention_policies';"
              psql "$DB_URL" -c "SELECT polname, polcmd FROM pg_policy p JOIN pg_class c ON c.oid=p.polrelid WHERE c.relname='_retention_policies';"
              # Spot-check tenant isolation: set tenant GUC to a specific tenant and verify only 1 row returned
              psql "$DB_URL" -At -c "SET app.retention_sweeper='on'; SELECT tenant_id FROM _retention_policies LIMIT 1" > /tmp/tid.txt
              TID=$(cat /tmp/tid.txt)
              echo "Spot check tenant: $TID"
              psql "$DB_URL" -c "SET app.current_tenant_id='$TID'; SELECT count(*) AS visible_for_tenant FROM _retention_policies;"
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: tiresias-secrets
                  key: database-url-sync
