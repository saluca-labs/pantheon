# Tiresias Partner Portal — standalone deployment for tiresias-partner GKE Autopilot cluster
# All resources in a single manifest. Secrets are placeholders; replace before apply.
apiVersion: v1
kind: Namespace
metadata:
  name: partner-portal
  labels:
    app.kubernetes.io/part-of: tiresias
    app.kubernetes.io/component: partner
    app.kubernetes.io/managed-by: kubectl
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: partner-portal-sa
  namespace: partner-portal
  labels:
    app.kubernetes.io/part-of: tiresias
    app.kubernetes.io/component: partner
  annotations:
    iam.gke.io/gcp-service-account: tiresias-partner-sa@salucainfrastructure.iam.gserviceaccount.com
---
apiVersion: v1
kind: Secret
metadata:
  name: partner-portal-secrets
  namespace: partner-portal
  labels:
    app.kubernetes.io/part-of: tiresias
    app.kubernetes.io/component: partner
type: Opaque
data:
  database-url: Q0hBTkdFTUU=
  database-url-sync: Q0hBTkdFTUU=
  jwt-private-key: Q0hBTkdFTUU=
  jwt-public-key: Q0hBTkdFTUU=
  jwt-kid: Q0hBTkdFTUU=
  stripe-secret-key: Q0hBTkdFTUU=
  stripe-webhook-secret: Q0hBTkdFTUU=
  stripe-partner-webhook-secret: Q0hBTkdFTUU=
  stripe-connect-client-id: Q0hBTkdFTUU=
  resend-api-key: Q0hBTkdFTUU=
  internal-api-key: Q0hBTkdFTUU=
  partner-ops-slack-webhook: Q0hBTkdFTUU=
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: partner-portal-config
  namespace: partner-portal
  labels:
    app.kubernetes.io/part-of: tiresias
    app.kubernetes.io/component: partner
data:
  SOULAUTH_MODE: "enterprise"
  SOULAUTH_LOG_LEVEL: "info"
  TIER_GUARD_ENABLED: "monitor"
  TIRESIAS_TIER: "mssp"
  STRIPE_PARTNER_PRODUCT_MSSP: "CHANGEME"
  STRIPE_PARTNER_PRICE_MSSP_MONTHLY: "CHANGEME"
  STRIPE_PARTNER_PRICE_MSSP_ANNUAL: "CHANGEME"
  STRIPE_PARTNER_PRODUCT_TENANT: "CHANGEME"
  STRIPE_PARTNER_PRICE_TENANT: "CHANGEME"
  PARTNER_PAYOUT_DELAY_NEW: "7"
  PARTNER_PAYOUT_DELAY_GRADUATED: "2"
  PARTNER_GRADUATION_DAYS: "90"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: partner-api
  namespace: partner-portal
  labels:
    app: partner-api
    app.kubernetes.io/name: partner-api
    app.kubernetes.io/part-of: tiresias
    app.kubernetes.io/component: partner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: partner-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: partner-api
        app.kubernetes.io/name: partner-api
        app.kubernetes.io/part-of: tiresias
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: partner-portal-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: partner-api
          image: us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulauth:v3.7.0-partner
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: SOULAUTH_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: partner-portal-secrets
                  key: database-url
            - name: SOULAUTH_DATABASE_URL_SYNC
              valueFrom:
                secretKeyRef:
                  name: partner-portal-secrets
                  key: database-url-sync
            - name: SOULAUTH_JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: partner-portal-secrets
                  key: jwt-private-key
            - name: SOULAUTH_JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: partner-portal-secrets
                  key: jwt-public-key
            - name: SOULAUTH_JWT_KID
              valueFrom:
                secretKeyRef:
                  name: partner-portal-secrets
                  key: jwt-kid
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: partner-portal-secrets
                  key: stripe-secret-key
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: partner-portal-secrets
                  key: stripe-webhook-secret
            - name: STRIPE_PARTNER_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: partner-portal-secrets
                  key: stripe-partner-webhook-secret
            - name: STRIPE_CONNECT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: partner-portal-secrets
                  key: stripe-connect-client-id
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: partner-portal-secrets
                  key: resend-api-key
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: partner-portal-secrets
                  key: internal-api-key
            - name: PARTNER_OPS_SLACK_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: partner-portal-secrets
                  key: partner-ops-slack-webhook
            - name: SOULAUTH_MODE
              valueFrom:
                configMapKeyRef:
                  name: partner-portal-config
                  key: SOULAUTH_MODE
            - name: SOULAUTH_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: partner-portal-config
                  key: SOULAUTH_LOG_LEVEL
            - name: TIER_GUARD_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: partner-portal-config
                  key: TIER_GUARD_ENABLED
            - name: TIRESIAS_TIER
              valueFrom:
                configMapKeyRef:
                  name: partner-portal-config
                  key: TIRESIAS_TIER
            - name: STRIPE_PARTNER_PRODUCT_MSSP
              valueFrom:
                configMapKeyRef:
                  name: partner-portal-config
                  key: STRIPE_PARTNER_PRODUCT_MSSP
            - name: STRIPE_PARTNER_PRICE_MSSP_MONTHLY
              valueFrom:
                configMapKeyRef:
                  name: partner-portal-config
                  key: STRIPE_PARTNER_PRICE_MSSP_MONTHLY
            - name: STRIPE_PARTNER_PRICE_MSSP_ANNUAL
              valueFrom:
                configMapKeyRef:
                  name: partner-portal-config
                  key: STRIPE_PARTNER_PRICE_MSSP_ANNUAL
            - name: STRIPE_PARTNER_PRODUCT_TENANT
              valueFrom:
                configMapKeyRef:
                  name: partner-portal-config
                  key: STRIPE_PARTNER_PRODUCT_TENANT
            - name: STRIPE_PARTNER_PRICE_TENANT
              valueFrom:
                configMapKeyRef:
                  name: partner-portal-config
                  key: STRIPE_PARTNER_PRICE_TENANT
            - name: PARTNER_PAYOUT_DELAY_NEW
              valueFrom:
                configMapKeyRef:
                  name: partner-portal-config
                  key: PARTNER_PAYOUT_DELAY_NEW
            - name: PARTNER_PAYOUT_DELAY_GRADUATED
              valueFrom:
                configMapKeyRef:
                  name: partner-portal-config
                  key: PARTNER_PAYOUT_DELAY_GRADUATED
            - name: PARTNER_GRADUATION_DAYS
              valueFrom:
                configMapKeyRef:
                  name: partner-portal-config
                  key: PARTNER_GRADUATION_DAYS
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
              ephemeral-storage: 100Mi
            limits:
              cpu: "1"
              memory: 512Mi
              ephemeral-storage: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.3
          args:
            - "--structured-logs"
            - "--auto-iam-authn"
            - "salucainfrastructure:us-central1:tiresias-db"
          ports:
            - containerPort: 3307
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
            runAsNonRoot: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: partner-dashboard
  namespace: partner-portal
  labels:
    app: partner-dashboard
    app.kubernetes.io/name: partner-dashboard
    app.kubernetes.io/part-of: tiresias
    app.kubernetes.io/component: partner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: partner-dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: partner-dashboard
        app.kubernetes.io/name: partner-dashboard
        app.kubernetes.io/part-of: tiresias
    spec:
      serviceAccountName: partner-portal-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: partner-dashboard
          image: us-central1-docker.pkg.dev/salucainfrastructure/tiresias/portal:v2.5.0
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nextjs-cache
              mountPath: /app/.next/cache
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://partner-api.partner-portal.svc.cluster.local:80"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 100Mi
            limits:
              cpu: 500m
              memory: 256Mi
              ephemeral-storage: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: nextjs-cache
          emptyDir:
            sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: partner-api
  namespace: partner-portal
  labels:
    app: partner-api
    app.kubernetes.io/name: partner-api
    app.kubernetes.io/part-of: tiresias
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: partner-api
---
apiVersion: v1
kind: Service
metadata:
  name: partner-dashboard
  namespace: partner-portal
  labels:
    app: partner-dashboard
    app.kubernetes.io/name: partner-dashboard
    app.kubernetes.io/part-of: tiresias
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: partner-dashboard
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: partner-portal-cert
  namespace: partner-portal
  labels:
    app.kubernetes.io/part-of: tiresias
    app.kubernetes.io/component: partner
spec:
  domains:
    - partners.tiresias.network
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: partner-portal-ingress
  namespace: partner-portal
  labels:
    app.kubernetes.io/part-of: tiresias
    app.kubernetes.io/component: partner
  annotations:
    kubernetes.io/ingress.class: "gce"
    networking.gke.io/managed-certificates: "partner-portal-cert"
    networking.gke.io/v1beta1.FrontendConfig: "partner-portal-frontend"
spec:
  rules:
    - host: partners.tiresias.network
      http:
        paths:
          # Partner API routes
          - path: /v1/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: partner-api
                port:
                  number: 80
          - path: /health
            pathType: ImplementationSpecific
            backend:
              service:
                name: partner-api
                port:
                  number: 80
          # Partner dashboard (catch-all, must be last)
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: partner-dashboard
                port:
                  number: 80
---
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: partner-portal-frontend
  namespace: partner-portal
  labels:
    app.kubernetes.io/part-of: tiresias
    app.kubernetes.io/component: partner
spec:
  redirectToHttps:
    enabled: true
    responseCodeName: MOVED_PERMANENTLY_DEFAULT
---
apiVersion: batch/v1
kind: Job
metadata:
  name: partner-portal-migrate
  namespace: partner-portal
  labels:
    app.kubernetes.io/part-of: tiresias
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: partner-portal-migrate
        app.kubernetes.io/part-of: tiresias
    spec:
      serviceAccountName: partner-portal-sa
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: migrate
          image: us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulauth:v3.7.0-partner
          imagePullPolicy: Always
          command: ["alembic", "upgrade", "head"]
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: partner-portal-secrets
                  key: database-url
            - name: DATABASE_URL_SYNC
              valueFrom:
                secretKeyRef:
                  name: partner-portal-secrets
                  key: database-url-sync
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.3
          args:
            - "--structured-logs"
            - "--auto-iam-authn"
            - "salucainfrastructure:us-central1:tiresias-db"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            runAsNonRoot: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
