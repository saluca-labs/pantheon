# -----------------------------------------------------------------------------
# Phase F — Partner export secret skeletons
# -----------------------------------------------------------------------------
# Both secrets start empty. Operator adds one key per partner_id as partners
# are onboarded. DO NOT commit real cert/token material to git; apply these
# skeletons once, then `kubectl patch` or use sealed-secrets/external-secrets
# in production.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: partner-export-tls-certs
  namespace: tiresias-logging
  labels:
    app: fluent-bit
    component: partner-exports
    phase: F
  annotations:
    tiresias.saluca.com/content: |
      Map of <partner_id> -> PEM-encoded client certificate bundle
      (client.crt + client.key concatenated, plus optional ca.crt).
      Used when destination.type is syslog_tls, gelf_tls, or https with
      mTLS.
type: Opaque
stringData: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: partner-export-auth-tokens
  namespace: tiresias-logging
  labels:
    app: fluent-bit
    component: partner-exports
    phase: F
  annotations:
    tiresias.saluca.com/content: |
      Map of <partner_id> -> bearer token or API-key string for HTTP/HTTPS
      and OTLP-HTTP destinations. Consumed by generate_partner_conf.py
      and injected into the rendered [OUTPUT] Header directives.
type: Opaque
stringData: {}
