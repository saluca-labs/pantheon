# Tiresias SOC — Prometheus Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  # DreamServer host metrics
  - job_name: node-dreamserver
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          host: dreamserver
          env: production

  # Pentest target host metrics
  - job_name: node-pentest
    static_configs:
      - targets: ['192.168.12.169:9100']
        labels:
          host: pentest-target
          env: staging

  # Docker container metrics (cAdvisor)
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          host: dreamserver

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Grafana metrics
  - job_name: grafana
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: grafana
    metrics_path: /metrics

  # Loki metrics
  - job_name: loki
    static_configs:
      - targets: ['loki:3100']
        labels:
          service: loki
    metrics_path: /metrics

  # GKE Tiresias production (uncomment when /metrics exposed)
