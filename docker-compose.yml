###############################################################################
# Tiresias Platform — Root Docker Compose
#
# Profiles:
#   (default) — db + mailhog + platform-api + platform-web
#   full       — all of the above + redis + platform-app-proxy + platform-sovereign + worker
#   ci         — db only (services built & tested separately in CI)
#
# Usage:
#   docker compose up --build                  # default profile
#   docker compose --profile full up --build   # full stack
#   docker compose --profile ci up             # CI infra only
###############################################################################

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    profiles: [default, full]
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    logging:
      driver: none

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: [full]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Applications ────────────────────────────────────────────────────────────

  memory-service:
    build:
      context: .
      dockerfile: apps/memory-service/Dockerfile
    restart: unless-stopped
    profiles: [default, full]
    environment:
      MEMORY_SERVICE_PORT: "8910"
      MEMORY_SERVICE_KEY: ${MEMORY_SERVICE_KEY:-changeme-memory-service-shared-secret}
      MEMORY_BACKEND: ${MEMORY_BACKEND:-sqlite}
      ASPHODEL_DB: /data/memory.db
      ASPHODEL_DATABASE_URL: ${ASPHODEL_DATABASE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    volumes:
      - memory_data:/data
    ports:
      - "8910:8910"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8910/health/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  platform-api:
    build:
      context: .
      dockerfile: apps/platform-api/Dockerfile
    restart: unless-stopped
    profiles: [default, full]
    environment:
      # SOULAUTH_-prefixed vars are consumed by platform-api/config/settings.py
      # (env_prefix="SOULAUTH_"); legacy unprefixed vars retained for any
      # downstream consumers that still expect them.
      SOULAUTH_MODE: ${SOULAUTH_MODE:-enterprise}
      SOULAUTH_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/${POSTGRES_DB:-platform}
      SOULAUTH_DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/${POSTGRES_DB:-platform}
      SOULAUTH_SESSION_SECRET: ${SESSION_SECRET:-changeme-at-least-32-chars-long!!}
      SOULAUTH_AUTH_MODE: ${AUTH_MODE:-local}
      SOULAUTH_WEB_PUBLIC_URL: ${WEB_PUBLIC_URL:-http://localhost:3000}
      SOULAUTH_API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8000}
      SOULAUTH_MEMORY_SERVICE_URL: http://memory-service:8910
      SOULAUTH_MEMORY_SERVICE_KEY: ${MEMORY_SERVICE_KEY:-changeme-memory-service-shared-secret}
      # License is not required for smoke / local stack; set TIRESIAS_LICENSE_KEY
      # or SOULAUTH_LICENSE_REQUIRED=true in production.
      SOULAUTH_LICENSE_REQUIRED: ${SOULAUTH_LICENSE_REQUIRED:-false}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/${POSTGRES_DB:-platform}
      SESSION_SECRET: ${SESSION_SECRET:-changeme-at-least-32-chars-long!!}
      AUTH_MODE: ${AUTH_MODE:-local}
      WEB_PUBLIC_URL: ${WEB_PUBLIC_URL:-http://localhost:3000}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8000}
      MEMORY_SERVICE_URL: http://memory-service:8910
      MEMORY_SERVICE_KEY: ${MEMORY_SERVICE_KEY:-changeme-memory-service-shared-secret}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      memory-service:
        # service_started rather than service_healthy: the upstream
        # depends only on memory-service being up; the smoke harness
        # exercises the actual API surface for true correctness.
        condition: service_started
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  platform-web:
    build:
      context: .
      dockerfile: apps/platform-web/Dockerfile
    restart: unless-stopped
    profiles: [default, full]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/${POSTGRES_DB:-platform}
      SESSION_SECRET: ${SESSION_SECRET:-changeme-at-least-32-chars-long!!}
      AUTH_MODE: ${AUTH_MODE:-local}
      WEB_PUBLIC_URL: ${WEB_PUBLIC_URL:-http://localhost:3000}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8000}
      # Internal service URLs used by Next.js server-side routes
      # (e.g. /api/health/full aggregates these). Use compose service
      # hostnames so they resolve over the docker bridge.
      TIRESIAS_API_URL: http://platform-api:8000
      MEMORY_SERVICE_URL: http://memory-service:8910
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      NODE_ENV: production
      # Allow the session cookie over HTTP (smoke / local docker compose).
      # Set to 0 / unset in real production behind TLS.
      PLATFORM_INSECURE_COOKIES: "1"
    depends_on:
      platform-api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  platform-app-proxy:
    build:
      context: apps/platform-app-proxy
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: [full]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/${POSTGRES_DB:-platform}
      API_URL: http://platform-api:8000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      platform-api:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  platform-sovereign:
    build:
      context: apps/platform-sovereign
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: [full]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/${POSTGRES_DB:-platform}
      API_URL: http://platform-api:8000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      platform-api:
        condition: service_healthy
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8090/health/live')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: apps/platform-api/Dockerfile
    restart: unless-stopped
    profiles: [full]
    command: ["python", "-m", "src.worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/${POSTGRES_DB:-platform}
      REDIS_URL: redis://redis:6379/0
      SESSION_SECRET: ${SESSION_SECRET:-changeme-at-least-32-chars-long!!}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_HEALTH_PORT: "9100"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9100/health/live')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  db_data:
  memory_data:
