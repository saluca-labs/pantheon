# Phase 4 — Portal Split Spec
# Marketing site deployment: serves tiresias.network (public pages, SEO, trial signup)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketing-portal
  namespace: tiresias
  labels:
    app: marketing-portal
    app.kubernetes.io/name: marketing-portal
    app.kubernetes.io/part-of: tiresias
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marketing-portal
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: marketing-portal
        app.kubernetes.io/name: marketing-portal
        app.kubernetes.io/part-of: tiresias
    spec:
      serviceAccountName: tiresias-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: marketing-portal
          image: us-central1-docker.pkg.dev/salucainfrastructure/tiresias/marketing:v1.0.0
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nextjs-cache
              mountPath: /app/.next/cache
          env:
            - name: NEXT_PUBLIC_APP_URL
              value: "https://tiresias.network"
            - name: NEXT_PUBLIC_PLATFORM_URL
              value: "https://platform.tiresias.network"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 50Mi
            limits:
              cpu: 250m
              memory: 256Mi
              ephemeral-storage: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: nextjs-cache
          emptyDir:
            sizeLimit: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: marketing-portal
  namespace: tiresias
  labels:
    app: marketing-portal
    app.kubernetes.io/name: marketing-portal
    app.kubernetes.io/part-of: tiresias
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: marketing-portal
