apiVersion: batch/v1
kind: Job
metadata:
  name: tiresias-migrate
  namespace: tiresias
  labels:
    app.kubernetes.io/part-of: tiresias
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: tiresias-migrate
        app.kubernetes.io/part-of: tiresias
    spec:
      serviceAccountName: tiresias-sa
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: migrate
          image: us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulauth:v1.0.0
          imagePullPolicy: Always
          command: ["alembic", "upgrade", "head"]
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: SOULAUTH_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tiresias-secrets
                  key: database-url
            - name: SOULAUTH_DATABASE_URL_SYNC
              valueFrom:
                secretKeyRef:
                  name: tiresias-secrets
                  key: database-url-sync
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.3
          args:
            - "--structured-logs"
            - "--auto-iam-authn"
            - "salucainfrastructure:us-central1:tiresias-db"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            runAsNonRoot: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
