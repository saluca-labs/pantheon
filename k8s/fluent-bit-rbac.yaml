---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: tiresias-logging
  annotations:
    iam.gke.io/gcp-service-account: fluent-bit-logger@salucainfrastructure.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit-tiresias
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - pods/logs
      - nodes
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit-tiresias
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit-tiresias
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: tiresias-logging
