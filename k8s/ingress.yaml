apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: tiresias-cert
  namespace: tiresias
  labels:
    app.kubernetes.io/part-of: tiresias
spec:
  domains:
    - tiresias.saluca.com
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tiresias-ingress
  namespace: tiresias
  labels:
    app.kubernetes.io/part-of: tiresias
  annotations:
    kubernetes.io/ingress.class: "gce"
    networking.gke.io/managed-certificates: "tiresias-cert"
    kubernetes.io/ingress.global-static-ip-name: "tiresias-ip"
    networking.gke.io/v1beta1.FrontendConfig: "tiresias-frontend"
spec:
  rules:
    - host: tiresias.saluca.com
      http:
        paths:
          # SoulAuth API routes
          - path: /v1/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: soulauth
                port:
                  number: 80
          # Health check endpoint
          - path: /health
            pathType: ImplementationSpecific
            backend:
              service:
                name: soulauth
                port:
                  number: 80
          # Metrics endpoint
          - path: /metrics
            pathType: ImplementationSpecific
            backend:
              service:
                name: soulauth
                port:
                  number: 80
          # Next.js API routes (billing webhook, etc.)
          - path: /api/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: portal
                port:
                  number: 80
          # Portal frontend (catch-all, must be last)
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: portal
                port:
                  number: 80
---
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: tiresias-frontend
  namespace: tiresias
  labels:
    app.kubernetes.io/part-of: tiresias
spec:
  redirectToHttps:
    enabled: true
    responseCodeName: MOVED_PERMANENTLY_DEFAULT
