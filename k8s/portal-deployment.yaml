apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: tiresias
  labels:
    app: portal
    app.kubernetes.io/name: portal
    app.kubernetes.io/part-of: tiresias
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portal
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: portal
        app.kubernetes.io/name: portal
        app.kubernetes.io/part-of: tiresias
    spec:
      serviceAccountName: tiresias-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: portal
          image: us-central1-docker.pkg.dev/salucainfrastructure/tiresias/portal:v1.0.0
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nextjs-cache
              mountPath: /app/.next/cache
          env:
            - name: NEXT_PUBLIC_SOULAUTH_API_URL
              value: "https://tiresias.saluca.com"
            - name: NEXT_PUBLIC_SOULWATCH_API_URL
              value: "http://soulwatch.tiresias.svc.cluster.local"
            - name: NEXT_PUBLIC_SOULGATE_API_URL
              value: "http://soulgate.tiresias.svc.cluster.local"
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: tiresias-secrets
                  key: stripe-secret-key
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: tiresias-secrets
                  key: stripe-webhook-secret
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
              ephemeral-storage: 100Mi
            limits:
              cpu: "1"
              memory: 512Mi
              ephemeral-storage: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: nextjs-cache
          emptyDir:
            sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: tiresias
  labels:
    app: portal
    app.kubernetes.io/name: portal
    app.kubernetes.io/part-of: tiresias
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: portal
