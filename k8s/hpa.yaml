apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: soulauth-hpa
  namespace: tiresias
  labels:
    app: soulauth
    app.kubernetes.io/name: soulauth
    app.kubernetes.io/part-of: tiresias
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: soulauth
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
