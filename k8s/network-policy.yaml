  name: tiresias-proxy-netpol
  namespace: tiresias
spec:
  podSelector:
    matchLabels:
      app: tiresias-proxy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: tiresias
