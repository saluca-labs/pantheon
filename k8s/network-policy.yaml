# Network policies for Tiresias platform
---
# SoulAuth: accepts from ingress + internal, egress to DB + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: soulauth-netpol
  namespace: tiresias
spec:
  podSelector:
    matchLabels:
      app: soulauth
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8000
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: tiresias
      ports:
        - protocol: TCP
          port: 8000
    # GCE health prober CIDRs (required for GKE load balancer health checks)
    - from:
        - ipBlock:
            cidr: 130.211.0.0/22
        - ipBlock:
            cidr: 35.191.0.0/16
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # GKE metadata server (Workload Identity token exchange)
    - to:
        - ipBlock:
            cidr: 169.254.0.0/16
      ports:
        - protocol: TCP
          port: 80
    - ports:
        - protocol: TCP
          port: 3307
    - ports:
        - protocol: TCP
          port: 443
---
