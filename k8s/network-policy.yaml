# Network policies for Tiresias platform
---
# SoulAuth: accepts from ingress + internal, egress to DB + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: soulauth-netpol
  namespace: tiresias
spec:
  podSelector:
    matchLabels:
      app: soulauth
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8000
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: tiresias
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 169.254.0.0/16
      ports:
        - protocol: TCP
          port: 80
    - ports:
        - protocol: TCP
          port: 3307
    - ports:
        - protocol: TCP
          port: 443
---
# SoulGate: accepts from ingress, egress to SoulAuth + SoulWatch + DB + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: soulgate-netpol
  namespace: tiresias
spec:
  podSelector:
    matchLabels:
      app: soulgate
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: tiresias
      ports:
        - protocol: TCP
          port: 8002
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 169.254.0.0/16
      ports:
        - protocol: TCP
          port: 80
    - to:
        - podSelector:
            matchLabels:
              app: soulauth
      ports:
        - protocol: TCP
          port: 8000
    - to:
        - podSelector:
            matchLabels:
              app: soulwatch
      ports:
        - protocol: TCP
          port: 8001
    - ports:
        - protocol: TCP
          port: 3307
    - ports:
        - protocol: TCP
          port: 443
---
# SoulWatch: accepts from internal services on port 8001, egress to SoulAuth + DB + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: soulwatch-netpol
  namespace: tiresias
spec:
  podSelector:
    matchLabels:
      app: soulwatch
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: tiresias
      ports:
        - protocol: TCP
          port: 8001
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 169.254.0.0/16
      ports:
        - protocol: TCP
          port: 80
    - to:
        - podSelector:
            matchLabels:
              app: soulauth
      ports:
        - protocol: TCP
          port: 8000
    - ports:
        - protocol: TCP
          port: 3307
    - ports:
        - protocol: TCP
          port: 443
---
# Portal: accepts from ingress, egress to internal services + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: portal-netpol
  namespace: tiresias
spec:
  podSelector:
    matchLabels:
      app: portal
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 3000
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 169.254.0.0/16
      ports:
        - protocol: TCP
          port: 80
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: tiresias
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8001
        - protocol: TCP
          port: 8002
    - ports:
        - protocol: TCP
          port: 443
