apiVersion: apps/v1
kind: Deployment
metadata:
  name: soulauth
  namespace: soulauth
  labels:
    app: soulauth
    component: soul-svc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: soulauth
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: soulauth
        component: soul-svc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: soulauth
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: soulauth
          # Pinned image tag — never use :latest in production (FINDING-15)
          image: us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulauth:v2.4.4
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          # Container-level security hardening (FINDING-14)
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: SOULAUTH_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: soulauth-secrets
                  key: database-url
            - name: SOULAUTH_JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: soulauth-secrets
                  key: jwt-private-key
            - name: SOULAUTH_JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: soulauth-secrets
                  key: jwt-public-key
            - name: SOULAUTH_LOG_LEVEL
              value: "INFO"
            - name: SOULAUTH_DEBUG
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: soulauth
  namespace: soulauth
  labels:
    app: soulauth
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: soulauth
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: soulauth
  namespace: soulauth
---
apiVersion: v1
kind: Namespace
metadata:
  name: soulauth
  labels:
    app: soulauth
