# Tiresias SOC — Prometheus Alert Rules

groups:
  - name: tiresias-infrastructure
    interval: 30s
    rules:
      - alert: HostHighCpuUsage
        expr: 1 - avg by(host) (rate(node_cpu_seconds_total{mode="idle"}[5m])) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.host }}"
          description: "CPU above 85% for 5m. Current: {{ $value | humanizePercentage }}"

      - alert: HostHighMemoryUsage
        expr: 1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.host }}"
          description: "Memory above 85% for 5m. Current: {{ $value | humanizePercentage }}"

      - alert: HostDiskSpaceCritical
        expr: 1 - (node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}) > 0.85
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Disk critical on {{ $labels.host }}"
          description: "Root filesystem above 85%. Current: {{ $value | humanizePercentage }}"

      - alert: HostDiskWillFillIn24h
        expr: predict_linear(node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}[6h], 24*3600) < 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Disk on {{ $labels.host }} predicted to fill within 24h"

      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Target {{ $labels.job }} is down"
          description: "{{ $labels.instance }} unreachable for 2 minutes."

  - name: tiresias-containers
    interval: 30s
    rules:
      - alert: ContainerRestartLoop
        expr: increase(container_restart_count{name=~".+"}[15m]) > 3
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} restarting frequently"
          description: "{{ $value }} restarts in 15 minutes."

      - alert: ContainerHighCpu
        expr: rate(container_cpu_usage_seconds_total{name=~".+"}[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} high CPU"

      - alert: ContainerHighMemory
        expr: container_memory_usage_bytes{name=~".+"} / container_spec_memory_limit_bytes{name=~".+"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} approaching memory limit"

  - name: tiresias-loki
    interval: 60s
    rules:
      - alert: LokiHighIngestionRate
        expr: sum(rate(loki_distributor_bytes_received_total[5m])) > 10485760
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Loki ingestion rate above 10MB/s"

      - alert: LokiRequestErrors
        expr: rate(loki_request_duration_seconds_count{status_code=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Loki returning server errors"
