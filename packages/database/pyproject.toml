[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "platform-database"
version = "0.1.0"
description = "Platform database migrations and schema management"
requires-python = ">=3.11"
dependencies = [
  "alembic>=1.13.0",
  "sqlalchemy>=2.0.0",
  "asyncpg>=0.30.0",
  "psycopg2-binary>=2.9.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "pytest-asyncio>=0.24.0",
]

[project.scripts]
db-migrate = "platform_database.cli:migrate"
db-seed = "platform_database.cli:seed"

[tool.hatch.build.targets.wheel]
packages = ["platform_database"]
