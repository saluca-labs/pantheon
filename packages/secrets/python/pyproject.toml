[project]
name = "platform-secrets"
version = "0.1.0"
description = "Production secret-management facade for the @platform stack"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
vault = ["hvac>=2.0.0"]
aws = ["boto3>=1.28.0"]
gcp = ["google-cloud-secret-manager>=2.16.0"]
test = ["pytest>=8.0.0", "pytest-mock>=3.12.0"]

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["platform_secrets*"]
