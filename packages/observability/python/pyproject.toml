[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "platform-observability"
version = "0.1.0"
description = "Structured logging helpers for Python platform services"
requires-python = ">=3.11"
dependencies = [
  "structlog>=24.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["platform_observability"]
