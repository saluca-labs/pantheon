[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "platform-config"
version = "0.1.0"
description = "Shared environment validation for Python platform services"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.0.0",
  "pydantic-settings>=2.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "pytest-asyncio>=0.24.0",
]

[tool.hatch.build.targets.wheel]
packages = ["platform_config"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
