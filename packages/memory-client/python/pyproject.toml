[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "platform-memory-client"
version = "0.1.0"
description = "Async Python client for @platform/memory-service (HTTP sidecar)"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Saluca / Tiresias Platform" }]
dependencies = [
  "httpx>=0.27.0",
  "pydantic>=2.6.0",
]

[tool.hatch.build.targets.wheel]
packages = ["platform_memory_client"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
