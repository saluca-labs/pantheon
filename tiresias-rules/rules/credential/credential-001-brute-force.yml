title: AI Agent Credential Brute Force
id: credential-001
status: stable
level: high
description: |
  Detects more than 5 failed authentication attempts from the same source
  within a 2-minute window. AI agents should authenticate successfully on
  first attempt using valid SoulKeys; repeated failures indicate credential
  stuffing, brute force, or misconfigured automation attempting unauthorized
  access to the Tiresias agent mesh.
author: Saluca LLC
date: 2026/03/31
references:
  - https://tiresias.network/docs/rules/credential-001
  - https://attack.mitre.org/techniques/T1110/
tags:
  - attack.credential_access
  - mitre.t1110
  - tiresias.soulkey
logsource:
  product: tiresias
  service: soulauth
detection:
  selection:
    event_type: authentication_failure
    auth_method:
      - soulkey
      - api_key
      - bearer_token
  filter_known_rotation:
    event_type: key_rotation_in_progress
    rotation_status: active
  condition: selection and not filter_known_rotation
  timeframe: 2m
  threshold:
    field: source_ip
    gte: 5
  group_by:
    - source_ip
    - target_agent_id
fields:
  - source_ip
  - source_agent_id
  - target_agent_id
  - auth_method
  - failure_reason
  - geo_location
  - user_agent
  - timestamp
falsepositives:
  - Automated key rotation process generating transient failures
  - Load balancer health checks with expired credentials
  - CI/CD pipeline using stale cached credentials after rotation
response_playbook: playbook-credential-001
