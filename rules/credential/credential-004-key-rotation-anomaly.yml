title: Abnormal Key Rotation Pattern
id: credential-004
status: stable
level: medium
description: |
  Detects an agent rotating its SoulKey more than 3 times within a 24-hour
  period. Normal rotation occurs on a scheduled cadence (weekly or monthly).
  Rapid repeated rotation may indicate an agent detecting compromise and
  panic-rotating, an attacker cycling keys to lock out the legitimate owner,
  or automation bugs creating key churn that degrades mesh trust.
author: Saluca LLC
date: 2026/03/31
references:
  - https://tiresias.network/docs/rules/credential-004
  - https://attack.mitre.org/techniques/T1098/
tags:
  - attack.credential_access
  - attack.persistence
  - mitre.t1098
  - tiresias.soulkey
logsource:
  product: tiresias
  service: soulauth
detection:
  selection:
    event_type: key_rotation
    rotation_type:
      - manual
      - automated
      - emergency
  condition: selection | count() by agent_id > 3
  timeframe: 24h
  group_by:
    - agent_id
fields:
  - agent_id
  - soulkey_id_old
  - soulkey_id_new
  - rotation_type
  - rotation_reason
  - source_ip
  - initiated_by
  - timestamp
falsepositives:
  - Incident response team performing deliberate emergency rotations
  - Initial agent provisioning with test-then-production key setup
  - Automated compliance scan triggering rotation on policy change
response_playbook: playbook-credential-004
