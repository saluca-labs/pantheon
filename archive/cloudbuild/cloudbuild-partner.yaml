steps:
  # Build SoulAuth with partner modules
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-soulauth-partner'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulauth:v3.7.0-partner'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Step 3: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-soulauth-partner'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulauth:v3.7.0-partner'
    waitFor: ['build-soulauth-partner']

images:
  - 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulauth:v3.7.0-partner'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: GCS_ONLY

timeout: '1800s'
