name: Security Scanning

on:
  push:
    branches: [main, "fix/**", "feat/**"]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 07:00 UTC alongside the weekly exec review
    - cron: "0 7 * * 1"
  workflow_dispatch:

env:
  PROJECT: salucainfrastructure
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/salucainfrastructure/tiresias

jobs:
  # ---------------------------------------------------------------------------
  # Dependency vulnerability scan (pip-audit)
  # Non-blocking initially — results are logged but do not fail the build.
  # Set continue-on-error: false once the initial finding backlog is cleared.
  # ---------------------------------------------------------------------------
  pip-audit:
    name: Python dependency audit (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        continue-on-error: true
        run: |
          pip-audit \
            --requirement requirements.txt \
            --format json \
            --output pip-audit-results.json \
            --progress-spinner off \
            || true
          # Always pretty-print results to the build log even on error
          pip-audit \
            --requirement requirements.txt \
            --format columns \
            --progress-spinner off \
            || true

      - name: Upload pip-audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Container image vulnerability scan (Trivy)
  # Builds soulauth as the representative service image, then scans it.
  # Non-blocking initially — continue-on-error: true.
  # ---------------------------------------------------------------------------
  trivy-scan:
    name: Container image scan (Trivy)
    runs-on: ubuntu-latest
    # Run after pip-audit so the log order is clear; not a hard dependency.
    needs: pip-audit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build soulauth image (scan target)
        run: |
          docker build \
            -t tiresias/soulauth:scan-${{ github.sha }} \
            -f Dockerfile \
            .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.29.0 pinned 2026-03-24
        continue-on-error: true
        with:
          image-ref: "tiresias/soulauth:scan-${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy-container"

      - name: Also emit Trivy results as table (build log)
        continue-on-error: true
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --format table \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            tiresias/soulauth:scan-${{ github.sha }}
