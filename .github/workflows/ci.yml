name: SoulAuth CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: black (formatting)
        run: black --check --diff src/ tests/ config/

      - name: isort (import order)
        run: isort --check-only --diff src/ tests/ config/

      - name: mypy (type checking)
        run: mypy src/ --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soulauth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database schema
        run: psql -h localhost -U postgres -d soulauth -f database/schema.sql
        env:
          PGPASSWORD: postgres

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
        env:
          SOULAUTH_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/soulauth
          SOULAUTH_DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/soulauth
          SOULAUTH_DEBUG: "true"
          SOULAUTH_LOG_LEVEL: "DEBUG"

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t soulauth:${{ github.sha }} .

      - name: Verify image runs
        run: |
          docker run --rm -d --name soulauth-smoke \
            -e SOULAUTH_DATABASE_URL=sqlite+aiosqlite:///test.db \
            -e SOULAUTH_MODE=local \
            -p 8000:8000 \
            soulauth:${{ github.sha }} || true
          sleep 5
          docker stop soulauth-smoke 2>/dev/null || true

      # Container image vulnerability scanning (FINDING-19)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: soulauth:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -r requirements.txt

      # FINDING-11: No blanket ignore. Only specific, reviewed CVEs with justification.
      - name: Run pip-audit
        run: pip-audit -r requirements.txt
