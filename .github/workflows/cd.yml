name: CD — Build and Publish Images

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/cristianxruvalcaba-coder

jobs:
  publish:
    name: Publish ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            dockerfile: apps/platform-web/Dockerfile
            image_suffix: tiresias-web
          - service: api
            dockerfile: apps/platform-api/Dockerfile
            image_suffix: tiresias-api
          - service: app-proxy
            dockerfile: apps/platform-app-proxy/Dockerfile
            image_suffix: tiresias-app-proxy
            context: apps/platform-app-proxy
          - service: sovereign
            dockerfile: apps/platform-sovereign/Dockerfile
            image_suffix: tiresias-sovereign
            context: apps/platform-sovereign

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image_suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context || '.' }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
