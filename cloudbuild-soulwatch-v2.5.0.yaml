steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulwatch:v2.5.0'
      - '-f'
      - 'soulWatch/Dockerfile'
      - '.'
    id: 'build-soulwatch'

images:
  - 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulwatch:v2.5.0'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: GCS_ONLY

timeout: '900s'
