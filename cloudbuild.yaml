steps:
  # Build SoulAuth image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulauth:v1.0.0', '-f', 'Dockerfile', '.']
    id: 'build-soulauth'

  # Build SoulGate image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulgate:v1.0.0', '-f', 'soulGate/Dockerfile', '.']
    id: 'build-soulgate'

  # Build SoulWatch image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulwatch:v1.0.0', '-f', 'soulWatch/Dockerfile', '.']
    id: 'build-soulwatch'

  # Build Portal image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/portal:v1.0.0', '-f', 'portal/Dockerfile', '.']
    id: 'build-portal'

  # Push all images
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulauth:v1.0.0']
    waitFor: ['build-soulauth']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulgate:v1.0.0']
    waitFor: ['build-soulgate']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulwatch:v1.0.0']
    waitFor: ['build-soulwatch']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/portal:v1.0.0']
    waitFor: ['build-portal']

images:
  - 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulauth:v1.0.0'
  - 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulgate:v1.0.0'
  - 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/soulwatch:v1.0.0'
  - 'us-central1-docker.pkg.dev/salucainfrastructure/tiresias/portal:v1.0.0'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
